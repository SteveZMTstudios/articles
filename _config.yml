# Hexo Configuration
## Docs: //hexo.io/docs/configuration.html
## Source: //github.com/hexojs/hexo/

# Site
title: 老史尬侃 - Steve ZMT 's Blog

subtitle: 这家伙叽里咕噜说什么呢。
description: 随笔、日志、技术分享、个人作品 Steve ZMT is soliloquize here.
keywords: 
  - blog
  - 博客
  - 随笔
  - SteveZMT 
  - 史蒂夫ZMT
author: Steve ZMT
language: zh-CN
timezone: Asia/Shanghai

# URL
## Set your site url here. For example, if you use GitHub Page, set url as '//username.github.io/project'
url: https://blog.stevezmt.top
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - ".github/**/*" 
# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
#syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

## //developer.mozilla
# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include: 
  - ".github/**/*"
  - "robots.txt"
  - "_headers"
exclude:
ignore:

# Extensions
## Plugins: //hexo.io/plugins/
## Themes: //hexo.io/themes/
theme: default

# lazyload image
lazyload:
  enable: true
  onlypost: false # optional
  loadingImg: /images/loading.svg
  isSPA: true # optional
  preloadRatio: 1.25 # optional, default is 1

excerpt_length: 160
auto_excerpt:
  enable: true
  length: 150

# Markdown
## Docs: //github.com/niemingzhao/hexo-renderer-markdown#readme
markdown:
  render:
    html: true
    xhtmlOut: false
    breaks: true
    langPrefix: language-
    linkify: true
    typographer: true
    quotes: “”‘’
  plugins:
    markdown-it-anchor:
      level: 1
      permalink: true
      slugify: function (s){return encodeURIComponent(String(s).trim().toLowerCase().replace(/\s+/g,"-"))}
      tabIndex: -1
      uniqueSlugStartIndex: 1
      renderPermalink: function (b,c,d,a){var f;var e=[Object.assign(new d.Token("link_open","a",1),{attrs:[["class",c.permalinkClass],["href",c.permalinkHref(b,d)],["aria-hidden",true]]}),new d.Token("link_close","a",-1)];(f=d.tokens[a+1].children)["push"].apply(f,e)}
      permalinkClass: header-anchor
      permalinkSpace: false
      permalinkSymbol: ""
      permalinkBefore: false
    markdown-it-attrs:
      leftDelimiter: "{"
      rightDelimiter: "}"
      allowedAttributes: []
    markdown-it-checkbox:
      divWrap: false
      divClass: checkbox
      idPrefix: checkbox
    markdown-it-texmath:
      katexCssSrc: //gcore.jsdelivr.net/npm/katex/dist/katex.min.css
      texmathCssSrc: //gcore.jsdelivr.net/npm/markdown-it-texmath/css/texmath.min.css
      texmathDelimiters: dollars
      throwOnError: false
      errorColor: "#cc0000"
      macros: { "\\RR": "\\mathbb{R}" }

math:
  enabled: true
  engine: mathjax ##可选渲染引擎：mathjax、katex
  mathjax:
    cdn: //gcore.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
    mhchem: true
  katex:
    cdn_css: //gcore.jsdelivr.net/npm/katex@0.11.1/dist/katex.min.css
    cdn_js: //gcore.jsdelivr.net/npm/katex@0.11.1/dist/katex.min.js
    auto_render: //gcore.jsdelivr.net/npm/katex@0.11.1/dist/contrib/auto-render.min.js

# mermaid 
mermaid:
  enable: true 
  version: "8.4.0" 
  startOnload: true  #default true
  theme: 'default'    #default, forest, dark, neutral.


service_worker:
  maximumFileSizeToCacheInBytes: 5242880
  staticFileGlobs:
  - public/**/*.{css,html,js,png,svg,ttf,webp,woff,woff2,xml}
  stripPrefix: public
  verbose: true

# WeChat Sync Configuration
# 本配置控制"文章同步到微信公众号草稿箱"的行为
wechat_sync:
  enabled: true                 # 是否启用微信同步功能
  appid: ${WECHAT_APPID}         # 微信 AppID（通过环境变量注入）
  appsecret: ${WECHAT_APPSECRET} # 微信 AppSecret（通过环境变量注入）
  author: ${WECHAT_AUTHOR}       # 微信公众号作者名（可覆盖全局 author）
  origin: https://blog.stevezmt.top  # 博客原文链接的基础 URL
  
  # 文章装饰
  article_prefix: |             # 转发文章前的前缀段落（如：免责声明、导读等）
  article_suffix: |             # 转发文章后的后缀段落（如：原文链接、交流方式等）
  
  # 头图配置
  cover:
    use_default_when_missing: true              # 文章无头图时，使用默认随机头图
    default_cover_dir: themes/default/source/images/random  # 默认头图目录（相对仓库根目录）
  
  # 内容处理策略
  content:
    upload_images: true                    # 是否上传图片到微信素材库并替换 URL
    keep_original_image_urls: false        # 若 upload_images=false，是否保留原图片 URL（可能被微信拦截）
    apply_wechat_typography: true          # 为微信正文注入基础排版样式（标题、段落、代码块、图片）
    html_tags_whitelist:                   # 正文 HTML 标签白名单
      - p
      - h1
      - h2
      - h3
      - h4
      - h5
      - h6
      - a
      - strong
      - em
      - img
      - ol
      - ul
      - li
      - br
      - blockquote
      - code
      - pre
  
  # 同步机制
  sync:
    target: draft                # 目标：draft(草稿) 或 publish(直接发布，仅供参考)
    incremental: true            # 增量同步：仅新增文章，不重复同步
    # 可选：通过环境变量 WECHAT_FORCE_UUIDS=uuid1,uuid2 强制重发指定文章（绕过增量状态）
    max_retries: 3               # 单篇文章失败重试次数
    digest_max_bytes: 120        # 微信摘要最大字节数（UTF-8）
    timeout_ms: 30000            # 单次 API 调用超时（毫秒）

# Deployment
## Docs: //hexo.io/docs/one-command-deployment
deploy:
  - type: git
    repo: git@github.com:SteveZMTstudios/articles.git
    branch: gh-pages
    ignore_hidden: false
    force: true
    include: 
      - ".github/**/*"
